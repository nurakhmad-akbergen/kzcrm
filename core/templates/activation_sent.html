{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подтвердите email | KZCRMS</title>
  {% tailwind_css %}
</head>
<body class="min-h-screen bg-[#07111f] text-slate-100">
  <div class="relative min-h-screen overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(56,189,248,0.16),transparent_34%),radial-gradient(circle_at_top_right,rgba(20,184,166,0.16),transparent_30%),linear-gradient(180deg,#07111f_0%,#0b1627_42%,#101d32_100%)]"></div>
    <div class="relative z-10 mx-auto flex min-h-screen max-w-3xl items-center px-4 py-10 sm:px-6">
      <div class="w-full rounded-[34px] border border-white/10 bg-[linear-gradient(180deg,rgba(15,23,42,0.92),rgba(9,16,29,0.96))] p-8 shadow-[0_30px_90px_-35px_rgba(2,6,23,0.9)] sm:p-10">
        <div class="text-xs font-semibold uppercase tracking-[0.35em] text-teal-300/80">Подтверждение аккаунта</div>
        <h1 class="mt-4 text-4xl font-semibold tracking-tight text-white">Проверьте ваш email</h1>
        <p class="mt-5 text-base leading-8 text-slate-300">
          Мы отправили ссылку для подтверждения аккаунта. Откройте письмо, подтвердите адрес и после этого войдите в систему.
        </p>
        <div class="mt-8 flex flex-col gap-4 sm:flex-row">
          <a href="{% url 'login' %}" class="inline-flex items-center justify-center rounded-full bg-gradient-to-r from-teal-400 to-sky-400 px-7 py-4 text-base font-semibold text-slate-950 transition hover:from-teal-300 hover:to-sky-300">Перейти ко входу</a>
          <a href="{% url 'landing_page' %}" class="inline-flex items-center justify-center rounded-full border border-white/10 bg-white/5 px-7 py-4 text-base font-semibold text-white transition hover:bg-white/10">На главную</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
