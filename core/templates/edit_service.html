{% extends "core/base.html" %}

{% block page_title %}
Редактировать услугу
{% endblock %}

{% block page_subtitle %}
Изменение параметров услуги
{% endblock %}

{% block content %}
<section class="max-w-2xl crm-panel p-6">
    <h3 class="text-2xl font-semibold tracking-tight text-slate-950">Редактировать услугу</h3>

    <form method="POST" class="mt-6 space-y-5">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="flex flex-col gap-3 border-t border-slate-100 pt-6 sm:flex-row">
            <button class="inline-flex items-center justify-center rounded-full bg-teal-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-teal-500">
                Сохранить
            </button>

            <a href="{% url 'services_settings' %}" class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50">
                Отмена
            </a>
        </div>
    </form>
</section>
{% endblock %}
