{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата</title>
  {% tailwind_css %}
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#fff8ed,_#f7f5ef_55%,_#efe8de)] px-4 py-10 sm:px-6">
  <div class="mx-auto max-w-3xl rounded-[34px] border border-white/70 bg-white/90 p-6 shadow-[0_24px_80px_-32px_rgba(37,28,18,0.35)] sm:p-8">
    <div class="text-xs font-semibold uppercase tracking-[0.3em] text-emerald-600">Оплата</div>
    <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950">Отметить «Пришел»</h1>

    <div class="mt-8 grid gap-4 rounded-[28px] bg-slate-50/90 p-5 sm:grid-cols-3">
      <div>
        <div class="text-xs uppercase tracking-[0.22em] text-slate-400">Клиент</div>
        <div class="mt-2 font-semibold text-slate-900">{{ a.client.name }}</div>
      </div>
      <div>
        <div class="text-xs uppercase tracking-[0.22em] text-slate-400">Специалист</div>
        <div class="mt-2 font-semibold text-slate-900">{{ a.barber.name }}</div>
      </div>
      <div>
        <div class="text-xs uppercase tracking-[0.22em] text-slate-400">Услуга</div>
        <div class="mt-2 font-semibold text-slate-900">{{ a.service.name }} ({{ a.service.price_kzt }} ₸)</div>
      </div>
    </div>

    <form method="POST" class="mt-8 space-y-5">
      {% csrf_token %}
      <div>
        <label class="text-sm font-medium text-slate-700">Способ оплаты</label>
        <select name="method" class="mt-2 block w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-100">
          {% for v, label in methods %}
            <option value="{{ v }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="flex flex-col gap-3 sm:flex-row">
        <button class="rounded-full bg-emerald-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-emerald-500" type="submit">Подтвердить</button>
        <a class="rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50" href="/today/">Назад</a>
      </div>
    </form>
  </div>
</body>
</html>
